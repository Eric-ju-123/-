<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eric's Blog</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">✦</span>
        <span class="logo-text">Eric's Blog</span>
      </a>
      <div class="nav-links">
        <a href="#home" class="nav-link active">首页</a>
        <a href="#articles" class="nav-link">文章</a>
        <a href="#about" class="nav-link">关于</a>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
        <span class="theme-icon">🌙</span>
      </button>
    </div>
  </nav>

  <!-- Hero 区域 -->
  <header id="home" class="hero">
    <div class="hero-content">
      <h1 class="hero-title">
        <span class="gradient-text">探索 · 学习 · 分享</span>
      </h1>
      <p class="hero-subtitle">一个关于技术、生活和成长的记录空间</p>
      <div class="hero-stats">
        <div class="stat-item">
          <span class="stat-number" id="totalArticles">0</span>
          <span class="stat-label">篇文章</span>
        </div>
        <div class="stat-item">
          <span class="stat-number" id="totalCategories">0</span>
          <span class="stat-label">个分类</span>
        </div>
        <div class="stat-item">
          <span class="stat-number" id="totalReadTime">0</span>
          <span class="stat-label">分钟阅读</span>
        </div>
      </div>
      <a href="#articles" class="hero-cta">浏览文章 →</a>
    </div>
    <div class="hero-decoration">
      <div class="floating-shape shape-1"></div>
      <div class="floating-shape shape-2"></div>
      <div class="floating-shape shape-3"></div>
    </div>
  </header>

  <!-- 筛选栏 -->
  <section class="filter-section">
    <div class="container">
      <div class="filter-bar">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" id="searchInput" placeholder="搜索文章..." autocomplete="off">
        </div>
        <div class="category-filters" id="categoryFilters">
          <button class="filter-btn active" data-category="all">全部</button>
        </div>
      </div>
    </div>
  </section>

  <!-- 文章列表 -->
  <main id="articles" class="articles-section">
    <div class="container">
      <div class="articles-grid" id="articlesGrid">
        <!-- 文章卡片由 JS 动态生成 -->
        <div class="loading-state">
          <div class="spinner"></div>
          <p>加载中...</p>
        </div>
      </div>
      <div class="empty-state" id="emptyState" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <p>没有找到相关文章</p>
        <button class="reset-btn" onclick="resetFilters()">清除筛选</button>
      </div>
    </div>
  </main>

  <!-- 关于区域 -->
  <section id="about" class="about-section">
    <div class="container">
      <div class="about-card">
        <div class="about-avatar">
          <div class="avatar-circle">E</div>
        </div>
        <h2 class="about-title">关于我</h2>
        <p class="about-text">
          你好！我是 Eric，一名热爱技术和生活的探索者。<br>
          这个博客记录了我的学习旅程、技术笔记和生活感悟。<br>
          我相信分享是最好的学习方式。
        </p>
        <div class="about-tags">
          <span class="tag">🖥️ 前端开发</span>
          <span class="tag">📖 终身学习</span>
          <span class="tag">🌍 跨文化</span>
          <span class="tag">☕ 咖啡爱好者</span>
        </div>
      </div>
    </div>
  </section>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <p class="footer-text">© 2026 Eric's Blog. Built with ❤️ and GitHub Pages.</p>
        <a href="https://github.com/Eric-ju-123" class="footer-link" target="_blank" rel="noopener">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
          </svg>
          GitHub
        </a>
      </div>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
